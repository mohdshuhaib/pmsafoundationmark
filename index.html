        body {

            color: var(--gray-800);
            padding: 1rem;
            min-height: 100vh;

        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        
        .hidden { display: none !important; }

        /* --- LAYOUT --- */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid var(--gray-100);
            position: relative;
        }

        /* --- HEADER --- */
        .header {
            background: linear-gradient(to right, var(--emerald-800), var(--teal-700));
            color: white;
            padding: 1.5rem;
            position: relative;
            z-index: 50;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }
        .header-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
        }
        .header-title-wrapper { max-width: 48rem; }
        .header-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; line-height: 1.2; }
        .header-subtitle { font-size: 1.125rem; margin-top: 0.5rem; font-weight: 500; color: var(--emerald-100); }
        .header-desc { font-size: 0.875rem; margin-top: 0.25rem; color: var(--emerald-200); }

        /* --- STATS BOX --- */
        .stats-box {
            display: flex;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            width: 100%;
            justify-content: center;
        }
        .stat-item { text-align: center; }
        .stat-label { color: var(--emerald-100); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.25rem; }
        .stat-value { font-size: 1.875rem; font-weight: 900; filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07)); }
        .stat-value.passed { color: var(--emerald-300); }
        .stat-value.failed { color: var(--red-300); }
        .stat-divider { width: 1px; background: rgba(255, 255, 255, 0.2); }

        /* --- CONTROLS / DROPDOWNS --- */
        .actions-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.5rem; position: relative; z-index: 50; }
        .dropdown-container { position: relative; }
        
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.625rem 1rem; border-radius: 0.5rem; font-weight: 700; font-size: 0.875rem;
            transition: all 0.2s; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-class { background: white; color: var(--emerald-800); border: 1px solid var(--emerald-100); min-width: 150px; }
        .btn-class:hover { background: var(--gray-50); }
        
        .btn-pdf { background: var(--emerald-50); color: var(--emerald-900); border: 1px solid var(--emerald-100); }
        .btn-pdf:hover { background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .btn-zip { background: var(--teal-600); color: white; border: 1px solid var(--teal-500); }
        .btn-zip:hover { background: var(--teal-500); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-zip.disabled { opacity: 0.75; cursor: not-allowed; pointer-events: none; }

        .dropdown-menu {
            position: absolute; top: 100%; left: 0; margin-top: 0.5rem;
            background: white; border-radius: 0.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--gray-100); z-index: 50; overflow: hidden; min-width: 12rem;
        }
        .dropdown-item {
            width: 100%; text-align: left; padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 500;
            color: var(--gray-700); background: white; border-bottom: 1px solid var(--gray-50);
            display: flex; align-items: center; gap: 0.5rem; transition: background-color 0.2s;

        .dropdown-item.hover-emerald:hover { background: var(--emerald-50); color: var(--emerald-800); }
        .dropdown-item.hover-red:hover { background: var(--red-100); color: var(--red-700); }
        .dropdown-item.hover-green:hover { background: var(--green-100); color: var(--green-700); }
        .dropdown-item.hover-orange:hover { background: var(--orange-50); color: var(--orange-700); }
        .dropdown-item.hover-teal:hover { background: var(--teal-50); color: var(--teal-800); }

        .table-container { padding: 1.5rem; overflow-x: auto; width: 100%; position: relative; z-index: 0; }

        .table-container::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        th.text-center, td.text-center { text-align: center; }
        td { border-bottom: 1px solid var(--gray-100); border-right: 1px solid var(--gray-100); }

        .text-red { color: var(--red-500); font-weight: 500; }

            .header-subtitle { font-size: 1.25rem; }
            .header-desc { font-size: 1rem; }
            .stats-box { width: auto; }
        }
        @media (max-width: 639px) {
            .btn-text-hidden { display: none; } /* Hide text on small screens for zip btn */

            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            toast.className = `toast ${isWarning ? 'toast-warning' : 'toast-success'}`;
            const iconClass = isWarning ? 'ph-warning-circle' : 'ph-info';
            
            toast.innerHTML = `<i class="ph ${iconClass}" style="font-size: 1.125rem;"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger animation in
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            // Trigger animation out
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);

        // Dropdown Toggle Logic
        function toggleDropdown(id) {
            const dropdowns = ['classDropdown', 'pdfDropdown', 'zipDropdown'];
            dropdowns.forEach(d => {
                const el = document.getElementById(d);
                if (d === id) {
                    el.classList.toggle('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        // Close dropdowns when clicking outside
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown-container')) {
                ['classDropdown', 'pdfDropdown', 'zipDropdown'].forEach(id => {
                    document.getElementById(id).classList.add('hidden');
                });
            }
        });

        // Switch Class Tabs function
        function switchClass(className) {
            currentClass = className;
            
            // Update Title and Label
            document.getElementById('header-subtitle').innerText = `Mark List (${currentClass}) PMSA Wafy College, Kattilangadi`;
            document.getElementById('current-class-label').innerText = `Class: ${currentClass}`;

            renderTable();

        // Populate Table Function
        function renderTable() {
            const tbody = document.getElementById('student-table-body');
            const students = classData[currentClass];
            let html = '';
            
            // Update Pass/Fail Stats
            let passCount = 0;
            let failCount = 0;

            students.forEach((student) => {
                const isFail = student.status === 'F';
                if (isFail) failCount++; else passCount++;
                
                // Threshold definition based on image data references (<12 is red for 40, <6 is red for 20)
                const redTextClass = "text-red";
                const rowHighlight = isFail ? "" : "row-pass";
                const statusBadge = isFail 
                    ? `<span class="badge badge-fail">F</span>` 
                    : `<span class="badge badge-pass">P</span>`;

                html += `
                    <tr class="${rowHighlight}">
                        <td class="text-center font-medium">${student.regNo}</td>
                        <td class="font-medium text-gray-900">${student.name}</td>
                        <td class="text-center ${student.marks.Arabic < 12 ? redTextClass : ''}">${student.marks.Arabic}</td>
                        <td class="text-center ${student.marks["MLM 2"] < 12 ? redTextClass : ''}">${student.marks["MLM 2"]}</td>
                        <td class="text-center ${student.marks.English < 12 ? redTextClass : ''}">${student.marks.English}</td>
                        <td class="text-center ${student.marks.Hindi < 12 ? redTextClass : ''}">${student.marks.Hindi}</td>
                        <td class="text-center ${student.marks.SS < 12 ? redTextClass : ''}">${student.marks.SS}</td>
                        <td class="text-center ${student.marks.Maths < 12 ? redTextClass : ''}">${student.marks.Maths}</td>
                        <td class="text-center ${student.marks.Physics < 6 ? redTextClass : ''}">${student.marks.Physics}</td>
                        <td class="text-center ${student.marks.Chemistry < 6 ? redTextClass : ''}">${student.marks.Chemistry}</td>
                        <td class="text-center ${student.marks.Biology < 6 ? redTextClass : ''}">${student.marks.Biology}</td>
                        <td class="text-center font-bold bg-gray-cell">${student.total}</td>
                        <td class="text-center font-bold bg-gray-cell">${student.pct}</td>
                        <td class="text-center">${statusBadge}</td>
                        <td class="text-center sticky-col ${isFail ? 'bg-white' : 'bg-emerald-50'}">
                            <button onclick="downloadSinglePDF(${student.regNo})" class="btn-print">
                                <i class="ph ph-download-simple"></i> Print
                            </button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            
            // Render Stats in UI
            document.getElementById('stat-passed').innerText = passCount;
            document.getElementById('stat-failed').innerText = failCount;
        }

                    // All marks and totals centered

                    5: { halign: 'center' }, 6: { halign: 'center' }, 7: { halign: 'center' },
                    8: { halign: 'center' }, 9: { halign: 'center' }, 10: { halign: 'center' },
                    11: { halign: 'center', fontStyle: 'bold', fillColor: [243, 244, 246] }, // Gray-100 total column

                    // Check and apply red/green color logic for marks & status
                    if (data.section === 'body') {
                        const colIdx = data.column.index;
                        const val = data.cell.raw;
                        let isFailed = false;

                        // 40 max marks thresholds (idx 2 to 7)
                        if (colIdx >= 2 && colIdx <= 7 && val < 12) isFailed = true;
                        // 20 max marks thresholds (idx 8 to 10)
                        if (colIdx >= 8 && colIdx <= 10 && val < 6) isFailed = true;

                        if (isFailed) {
                            data.cell.styles.textColor = [220, 38, 38]; // Apply Red text color

        // --- NEW: Download Failed Subjects Categorized Report ---
        function downloadFailedSubjectsReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait' }); 
            const students = classData[currentClass];
            
            const subjects40 = ['Arabic', 'MLM 2', 'English', 'Hindi', 'SS', 'Maths'];
            const subjects20 = ['Physics', 'Chemistry', 'Biology'];
            
            const studentsWithFails = [];

            // Calculate failed subjects for each student
            students.forEach(student => {
                let failedSubjects = [];
                
                subjects40.forEach(sub => {
                    if (student.marks[sub] < 12) failedSubjects.push(sub);
                });
                
                subjects20.forEach(sub => {
                    if (student.marks[sub] < 6) failedSubjects.push(sub);
                });
                
                if (failedSubjects.length > 0) {
                    studentsWithFails.push({
                        regNo: student.regNo,
                        name: student.name,
                        failedSubjects: failedSubjects,
                        failCount: failedSubjects.length
                    });
                }
            });

            if (studentsWithFails.length === 0) {
                showToast("No students failed any subjects in this class!", true);
                return;
            }

            // Group by number of failed subjects
            const grouped = {};
            studentsWithFails.forEach(s => {
                if (!grouped[s.failCount]) grouped[s.failCount] = [];
                grouped[s.failCount].push(s);
            });

            const pageWidth = doc.internal.pageSize.getWidth();
            
            // Draw Headers
            doc.setFontSize(15);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(6, 78, 59); // Emerald 900
            doc.text("Wafy Foundation School Annual Examination- March 2026", pageWidth / 2, 16, { align: "center" });
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(50, 50, 50); 
            doc.text(`Mark List (${currentClass}) PMSA Wafy College, Kattilangadi - Failed Subjects List`, pageWidth / 2, 23, { align: "center" });

            // Prepare AutoTable Body with Groupings
            const tableBody = [];
            
            // Sort keys descending (e.g., 5 subjects failed, then 4, then 3...)
            const failCounts = Object.keys(grouped).map(Number).sort((a, b) => b - a);

            failCounts.forEach(count => {
                // Add Group Header Row
                tableBody.push([
                    {
                        content: `Failed ${count} Subject${count > 1 ? 's' : ''} (Total Students: ${grouped[count].length})`,
                        colSpan: 3,
                        styles: { fillColor: [243, 244, 246], fontStyle: 'bold', textColor: [17, 24, 39], halign: 'left' }
                    }
                ]);
                
                // Add Students for this group
                grouped[count].forEach(student => {
                    tableBody.push([
                        student.regNo,
                        student.name,
                        student.failedSubjects.join(', ')
                    ]);
                });
            });

            doc.autoTable({
                startY: 28,
                head: [['Reg.No', 'Name of student', 'Failed Subjects']],
                body: tableBody,
                theme: 'grid',
                styles: {
                    fontSize: 9, 
                    cellPadding: 3,
                    textColor: [55, 65, 81],
                    lineColor: [229, 231, 235],
                    lineWidth: 0.1
                },
                headStyles: {
                    fillColor: [15, 118, 110],
                    textColor: [255, 255, 255],
                    fontStyle: 'bold',
                    halign: 'left'
                },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 15, fontStyle: 'bold' },
                    1: { halign: 'left', cellWidth: 50, fontStyle: 'bold', textColor: [17, 24, 39] },
                    2: { halign: 'left', textColor: [220, 38, 38] } // Failed subjects in red text
                }
            });

            doc.save(`${currentClass}_Failed_Subjects_List_2026.pdf`);
            showToast("Failed subjects report generated!");
        }

        // --- NEW: Combined Rank List Report ---
        function downloadRankList() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait' });
            
            // Combine all students from all classes
            let allStudents = [];
            for (const [className, students] of Object.entries(classData)) {
                students.forEach(s => allStudents.push({ ...s, className }));
            }
            
            // Separate passed and failed students
            let passed = allStudents.filter(s => s.status === 'P');
            let failed = allStudents.filter(s => s.status === 'F');
            
            // Sort both arrays descending by total score
            passed.sort((a, b) => b.total - a.total);
            failed.sort((a, b) => b.total - a.total);
            
            // Calculate standard competition ranks for passed students
            let currentRank = 1;
            for (let i = 0; i < passed.length; i++) {
                if (i > 0 && passed[i].total < passed[i-1].total) {
                    currentRank = i + 1;
                }
                passed[i].rank = currentRank;
            }
            
            // Failed students get "-" rank
            failed.forEach(s => s.rank = "-");
            
            const tableData = [...passed, ...failed].map(s => [
                s.rank, s.className, s.regNo, s.name, s.total, s.pct + '%', s.status
            ]);
            
            const pageWidth = doc.internal.pageSize.getWidth();
            doc.setFontSize(15);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(6, 78, 59);
            doc.text("Wafy Foundation School Annual Examination - March 2026", pageWidth / 2, 16, { align: "center" });
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(50, 50, 50);
            doc.text("Combined Rank List (FDN-A & FDN-B)", pageWidth / 2, 23, { align: "center" });

            doc.autoTable({
                startY: 28,
                head: [['Rank', 'Class', 'Reg.No', 'Name of student', 'Total\n300', 'Pct', 'Status']],
                body: tableData,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 3, textColor: [55, 65, 81], lineColor: [229, 231, 235], lineWidth: 0.1 },
                headStyles: { fillColor: [15, 118, 110], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', fontStyle: 'bold' },
                    1: { halign: 'center', fontStyle: 'bold', textColor: [15, 118, 110] },
                    2: { halign: 'center' },
                    3: { halign: 'left', fontStyle: 'bold', textColor: [17, 24, 39] },
                    4: { halign: 'center', fontStyle: 'bold' },
                    5: { halign: 'center' },
                    6: { halign: 'center', fontStyle: 'bold' }
                },
                didParseCell: function(data) {
                    if (data.section === 'body') {
                        // Colorize Ranks 1, 2, 3
                        if (data.column.index === 0) {
                            if (data.cell.raw === 1) data.cell.styles.textColor = [217, 119, 6]; // Gold
                            else if (data.cell.raw === 2) data.cell.styles.textColor = [100, 116, 139]; // Silver

            const subjectsInfo = [
                { name: 'Arabic', max: 40, pass: 12 },
                { name: 'MLM 2', max: 40, pass: 12 },
                { name: 'English', max: 40, pass: 12 },
                { name: 'Hindi', max: 40, pass: 12 },
                { name: 'SS', max: 40, pass: 12 },
                { name: 'Maths', max: 40, pass: 12 },
                { name: 'Physics', max: 20, pass: 6 },
                { name: 'Chemistry', max: 20, pass: 6 },
                { name: 'Biology', max: 20, pass: 6 }
            ];
            
            // Calculate statistics
            let analysis = subjectsInfo.map(sub => {
                let passedCount = 0;
                let failedCount = 0;
                
                allStudents.forEach(s => {
                    if (s.marks[sub.name] >= sub.pass) {
                        passedCount++;
                    } else {
                        failedCount++;
                    }
                });
                
                const failPct = (failedCount / totalStudentsCount) * 100;
                const passPct = (passedCount / totalStudentsCount) * 100;
                
                return {
                    subject: sub.name,
                    max: sub.max,
                    total: totalStudentsCount,
                    passed: passedCount,
                    failed: failedCount,
                    failPct: failPct,
                    passPct: passPct
                };
            });
            
            // Sort by Fail Percentage (Descending - hardest subjects first)
            analysis.sort((a, b) => b.failPct - a.failPct);
            
            const tableBody = analysis.map((a, index) => [
                index + 1, // Order of difficulty (1 = hardest)
                a.subject,
                a.total,
                a.passed,
                a.failed,
                a.passPct.toFixed(1) + '%',
                a.failPct.toFixed(1) + '%'
            ]);
            
            const pageWidth = doc.internal.pageSize.getWidth();
            doc.setFontSize(15);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(6, 78, 59);
            doc.text("Wafy Foundation School Annual Examination - March 2026", pageWidth / 2, 16, { align: "center" });
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(50, 50, 50);
            doc.text("Subject-Wise Performance Analysis (FDN-A & FDN-B Combined)", pageWidth / 2, 23, { align: "center" });
            
            doc.setFontSize(9);
            doc.setTextColor(100, 100, 100);
            doc.text("Sorted by Hardest Subject (Highest Failure Rate)", pageWidth / 2, 28, { align: "center" });

            doc.autoTable({
                startY: 33,
                head: [['Diff. Rank', 'Subject', 'Total Students', 'Passed', 'Failed', 'Pass %', 'Fail %']],
                body: tableBody,
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 3, textColor: [55, 65, 81], lineColor: [229, 231, 235], lineWidth: 0.1 },
                headStyles: { fillColor: [15, 118, 110], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', fontStyle: 'bold', textColor: [156, 163, 175] },
                    1: { halign: 'left', fontStyle: 'bold', textColor: [17, 24, 39] },
                    2: { halign: 'center' },
                    3: { halign: 'center', textColor: [22, 163, 74], fontStyle: 'bold' }, // Green
                    4: { halign: 'center', textColor: [220, 38, 38], fontStyle: 'bold' }, // Red
                    5: { halign: 'center', textColor: [22, 163, 74] }, // Green
                    6: { halign: 'center', textColor: [220, 38, 38], fontStyle: 'bold' } // Red
                }
            });
            
            doc.save("Combined_Subject_Analysis_March2026.pdf");
            showToast("Subject Analysis Report generated successfully!");
        }

        // --- Existing Individual Marksheet PDF Generation Logic ---
        function buildStudentPDFContent(doc, student) {
            const pageWidth = doc.internal.pageSize.getWidth();
            let startY = 25;

            // Add Header
            doc.setFontSize(24);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(6, 78, 59); // Emerald 900
            doc.text("Wafy Foundation School", pageWidth / 2, startY, { align: "center" });

            doc.setFontSize(14);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(50, 50, 50);
            doc.text("Annual Examination - March 2026", pageWidth / 2, startY + 10, { align: "center" });
            
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text(`Mark List (${currentClass}) PMSA Wafy College, Kattilangadi`, pageWidth / 2, startY + 18, { align: "center" });

            // Horizontal Line
            doc.setDrawColor(200, 200, 200);
            doc.setLineWidth(0.5);
            doc.line(15, startY + 28, pageWidth - 15, startY + 28);

            // Add Student Details Box
            doc.setFontSize(13);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 0, 0);
            
            doc.text(`Student Name : ${student.name}`, 15, startY + 40);
            doc.text(`Register No : ${student.regNo}`, pageWidth - 15, startY + 40, { align: "right" });

            // Format Table Data
            const tableData = [
                ["Arabic", "40", student.marks.Arabic],
                ["MLM 2", "40", student.marks["MLM 2"]],
                ["English", "40", student.marks.English],
                ["Hindi", "40", student.marks.Hindi],
                ["SS", "40", student.marks.SS],
                ["Maths", "40", student.marks.Maths],
                ["Physics", "20", student.marks.Physics],
                ["Chemistry", "20", student.marks.Chemistry],
                ["Biology", "20", student.marks.Biology],
            ];

            // Render Table
            doc.autoTable({
                startY: startY + 48,
                margin: { left: 15, right: 15 },
                head: [['Subject', 'Max Marks', 'Marks Obtained']],
                body: tableData,
                theme: 'grid',
                styles: {
                    fontSize: 11,
                    cellPadding: 4 // Reduced padding to easily fit on one page
                },
                headStyles: { 
                    fillColor: [15, 118, 110], // Teal 700 
                    textColor: [255, 255, 255],
                    fontSize: 12,
                    fontStyle: 'bold',
                    halign: 'center'
                },
                columnStyles: {
                    0: { halign: 'left', fontStyle: 'bold' },
                    1: { halign: 'center' },
                    2: { halign: 'center', fontStyle: 'bold' }
                },
                alternateRowStyles: {
                    fillColor: [249, 250, 251]
                },
                foot: [
                    ['TOTAL', '300', student.total],
                    ['PERCENTAGE', '', `${student.pct}%`],
                    ['STATUS', '', student.status === 'P' ? 'PASS' : 'FAIL']
                ],
                footStyles: { 
                    fillColor: [245, 245, 245], // Light Gray
                    textColor: [0, 0, 0], 
                    fontStyle: 'bold',
                    halign: 'center',
                    fontSize: 12
                },
                didParseCell: function(data) {
                    // Color the Status Value cell
                    if (data.section === 'foot' && data.row.index === 2 && data.column.index === 2) {
                        if (student.status === 'P') {
                            data.cell.styles.textColor = [22, 163, 74]; // Green text for Pass
                        } else {
                            data.cell.styles.textColor = [220, 38, 38]; // Red text for Fail
                        }
                    }
                    
                    // Color failed subject marks in the body
                    if (data.section === 'body' && data.column.index === 2) {
                        const maxMarks = parseInt(data.row.raw[1]);
                        const marksObtained = parseInt(data.cell.raw);
                        
                        let isFailed = false;
                        if (maxMarks === 40 && marksObtained < 12) isFailed = true;
                        if (maxMarks === 20 && marksObtained < 6) isFailed = true;
                        
                        if (isFailed) {
                            data.cell.styles.textColor = [220, 38, 38]; // Red text for failed subject
                        }
                    }
                }
            });
        }

        function downloadSinglePDF(regNo) {
            const student = classData[currentClass].find(s => s.regNo === regNo);
            if (!student) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            buildStudentPDFContent(doc, student);
            
            const safeName = student.name.replace(/[^a-z0-9]/gi, '_').toUpperCase();
            doc.save(`${currentClass}_${safeName}_Marksheet_2026.pdf`);
            showToast(`Marksheet for ${student.name} downloaded!`);
        }

        async function downloadAllPDF(filterStatus = 'ALL') {
            const { jsPDF } = window.jspdf;
            const zip = new JSZip();
            
            const btn = document.getElementById('mainZipBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner icon-spin" style="font-size: 1.125rem;"></i> <span class="btn-text-hidden">Zipping...</span>';
            btn.classList.add('disabled');

            // Hide the dropdown menu immediately on click
            document.getElementById('zipDropdown').classList.add('hidden');

            try {
                let students = classData[currentClass];
                let fileSuffix = "All_Students";

                if (filterStatus === 'F') {
                    students = students.filter(s => s.status === 'F');
                    fileSuffix = "Failed_Students";
                } else if (filterStatus === 'P') {
                    students = students.filter(s => s.status === 'P');
                    fileSuffix = "Passed_Students";
                }

                if (students.length === 0) {
                    showToast(`No ${filterStatus === 'F' ? 'failed' : filterStatus === 'P' ? 'passed' : ''} students found to zip in this class!`, true);
                    btn.innerHTML = originalText;
                    btn.classList.remove('disabled');
                    return;
                }

                showToast(`Generating ZIP for ${students.length} students... Please wait.`);

                students.forEach((student) => {
                    const doc = new jsPDF();
                    buildStudentPDFContent(doc, student);
                    
                    const safeName = student.name.replace(/[^a-z0-9]/gi, '_').toUpperCase();
                    const fileName = `${currentClass}_${safeName}_Marksheet_2026.pdf`;
                    
                    const pdfArrayBuffer = doc.output('arraybuffer');
                    zip.file(fileName, pdfArrayBuffer);
                });

                const zipBlob = await zip.generateAsync({ type: "blob" });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = `${fileSuffix}_MarkSheets_${currentClass}_March2026.zip`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
                
                showToast("ZIP file successfully generated and downloaded!");
                
            } catch (error) {
                console.error("Error generating ZIP:", error);
                showToast("An error occurred while zipping files.", true);
            } finally {
                btn.innerHTML = originalText;
                btn.classList.remove('disabled');
            }
        }

        // Initialize table on load
        window.onload = renderTable;
    </script>
